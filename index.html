<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Breathing Cursor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        cursor: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
          ellipse at 50% 30%,
          #0d0015 0%,
          #05000a 40%,
          #000 100%
        );
      }
      .tanjiro-bg {
        position: fixed;
        top: -5%;
        left: -5%;
        width: 110%;
        height: 110%;
        z-index: 1;
        background-image: url("bg.png");
        background-size: cover;
        background-position: center;
        opacity: 0.9s;
        pointer-events: none;
        will-change: transform;
        transition: opacity 0.3s;
      }
      body.aura-active .tanjiro-bg {
        opacity: 0.22;
      }
      #c {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }
      #hd {
        position: fixed;
        inset: 0;
        z-index: 9;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="tanjiro-bg" id="tbg"></div>
    <canvas id="hd"></canvas>
    <canvas id="c"></canvas>

    <script>
      (function () {
        "use strict";

        /* ── Canvas & DPR ── */
        const C = document.getElementById("c");
        const ctx = C.getContext("2d");
        const HD = document.getElementById("hd");
        const hctx = HD.getContext("2d");
        let W, H, dpr;

        function resize() {
          dpr = Math.min(devicePixelRatio || 1, 2);
          W = innerWidth;
          H = innerHeight;
          C.width = W * dpr;
          C.height = H * dpr;
          C.style.width = W + "px";
          C.style.height = H + "px";
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          HD.width = W * dpr;
          HD.height = H * dpr;
          HD.style.width = W + "px";
          HD.style.height = H + "px";
          hctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }
        addEventListener("resize", resize);
        resize();

        /* ── Math helpers ── */
        const lerp = (a, b, t) => a + (b - a) * t;
        const rand = (a, b) => a + Math.random() * (b - a);
        const randi = (a, b) => (a + Math.random() * (b - a)) | 0;
        const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
        const TAU = Math.PI * 2;

        /* ── Moon Breathing color LUT ── */
        const LUT_R = new Uint8Array(256);
        const LUT_G = new Uint8Array(256);
        const LUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0,   [0,   0,   0  ]],
            [30,  [20,  0,   40 ]],
            [70,  [60,  0,   90 ]],
            [110, [110, 10,  160]],
            [150, [160, 30,  200]],
            [195, [200, 80,  240]],
            [230, [220, 160, 255]],
            [255, [240, 230, 255]],
          ];
          for (let i = 0; i < 256; i++) {
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s], [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                LUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                LUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                LUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
          }
        })();

        /* ── Blood crimson LUT ── */
        const BLUT_R = new Uint8Array(256);
        const BLUT_G = new Uint8Array(256);
        const BLUT_B = new Uint8Array(256);
        (function () {
          const stops = [
            [0,   [0,   0,  0 ]],
            [50,  [40,  0,  10]],
            [100, [120, 5,  20]],
            [160, [200, 20, 40]],
            [210, [240, 60, 80]],
            [255, [255, 140,160]],
          ];
          for (let i = 0; i < 256; i++) {
            for (let s = 0; s < stops.length - 1; s++) {
              const [t0, c0] = stops[s], [t1, c1] = stops[s + 1];
              if (i >= t0 && i <= t1) {
                const f = (i - t0) / (t1 - t0);
                BLUT_R[i] = (c0[0] + (c1[0] - c0[0]) * f) | 0;
                BLUT_G[i] = (c0[1] + (c1[1] - c0[1]) * f) | 0;
                BLUT_B[i] = (c0[2] + (c1[2] - c0[2]) * f) | 0;
                break;
              }
            }
          }
        })();

        function moonColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${LUT_R[i]},${LUT_G[i]},${LUT_B[i]},${a})`;
        }
        function bloodColor(t, a) {
          const i = clamp(t * 255, 0, 255) | 0;
          return `rgba(${BLUT_R[i]},${BLUT_G[i]},${BLUT_B[i]},${a})`;
        }

        /* ── Pointer state ── */
        const P = {
          x: W / 2, y: H / 2,
          tx: W / 2, ty: H / 2,
          px: W / 2, py: H / 2,
          vx: 0, vy: 0,
          speed: 0, lastMove: 0,
        };
        function setTarget(x, y) {
          P.tx = x; P.ty = y;
          P.lastMove = performance.now();
        }
        addEventListener("mousemove", (e) => setTarget(e.clientX, e.clientY));
        addEventListener("touchmove", (e) => {
          if (e.touches.length) setTarget(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        addEventListener("mousedown", (e) => {
          document.body.classList.add("aura-active");
          burst(e.clientX, e.clientY);
        });
        addEventListener("mouseup",    () => document.body.classList.remove("aura-active"));
        addEventListener("mouseleave", () => document.body.classList.remove("aura-active"));
        addEventListener("touchstart", (e) => {
          document.body.classList.add("aura-active");
          if (e.touches.length) {
            setTarget(e.touches[0].clientX, e.touches[0].clientY);
            burst(P.tx, P.ty);
          }
        }, { passive: true });
        addEventListener("touchend", () => document.body.classList.remove("aura-active"));

        /* ══════════════════════════════════════════
           PARTICLE POOLS
        ══════════════════════════════════════════ */

        /* — Moon Motes — */
        const EMAX = 600;
        const embers = [];
        for (let i = 0; i < EMAX; i++) embers.push({ alive: false });
        let eHead = 0;
        function spawnEmber(x, y, vx, vy, life, sz, hot, blood) {
          const e = embers[eHead % EMAX]; eHead++;
          e.alive = true; e.x = x; e.y = y; e.vx = vx; e.vy = vy;
          e.age = 0; e.life = life; e.sz = sz; e.hot = hot;
          e.sway = rand(0.3, 1.2); e.phase = rand(0, TAU);
          e.grav = rand(-20, 15); e.blood = blood || false;
          e.rot = rand(0, TAU); e.rotSpd = rand(-2, 2);
        }

        /* — Lunar mist — */
        const SMAX = 300;
        const smoke = [];
        for (let i = 0; i < SMAX; i++) smoke.push({ alive: false });
        let sHead = 0;
        function spawnSmoke(x, y, vx, vy, r, life, dark) {
          const s = smoke[sHead % SMAX]; sHead++;
          s.alive = true; s.x = x; s.y = y; s.vx = vx; s.vy = vy;
          s.age = 0; s.life = life; s.r = r; s.dark = dark || false;
        }

        /* — Moon energy puffs — */
        const FMAX = 350;
        const flames = [];
        for (let i = 0; i < FMAX; i++) flames.push({ alive: false });
        let fHead = 0;
        function spawnFlame(x, y, vx, vy, r, life, hot, blood) {
          const f = flames[fHead % FMAX]; fHead++;
          f.alive = true; f.x = x; f.y = y; f.vx = vx; f.vy = vy;
          f.age = 0; f.life = life; f.r = r; f.hot = hot; f.blood = blood || false;
        }

        /* — Ambient crescent arcs — */
        const CMAX = 120;
        const crescents = [];
        for (let i = 0; i < CMAX; i++) crescents.push({ alive: false });
        let cHead = 0;
        function spawnCrescent(x, y, angle, speed, r, life, hot, blood) {
          const c = crescents[cHead % CMAX]; cHead++;
          c.alive = true; c.x = x; c.y = y;
          c.vx = Math.cos(angle) * speed; c.vy = Math.sin(angle) * speed;
          c.angle = angle; c.r = r; c.age = 0; c.life = life;
          c.hot = hot; c.blood = blood || false; c.spin = rand(-3, 3);
        }

        /* — Void sparks — */
        const SPKMAX = 400;
        const sparks = [];
        for (let i = 0; i < SPKMAX; i++) sparks.push({ alive: false, px: 0, py: 0 });
        let spkHead = 0;
        function spawnSpark(x, y, vx, vy, life, bright, blood) {
          const s = sparks[spkHead % SPKMAX]; spkHead++;
          s.alive = true; s.x = x; s.y = y; s.px = x; s.py = y;
          s.vx = vx; s.vy = vy; s.age = 0; s.life = life;
          s.bright = bright; s.blood = blood || false;
        }

        /* ── KOKUSHIBO MOON BLADES ── */
        const MBMAX = 60;
        const moonBlades = [];
        for (let i = 0; i < MBMAX; i++) moonBlades.push({ alive: false });
        let mbHead = 0;
        function spawnMoonBlade(x, y, angle, speed, r, life, tier, waveIdx) {
          const b = moonBlades[mbHead % MBMAX]; mbHead++;
          b.alive = true;
          b.x = x; b.y = y;
          b.vx = Math.cos(angle) * speed;
          b.vy = Math.sin(angle) * speed;
          b.angle = angle;
          b.r = r;
          b.age = 0; b.life = life;
          b.tier = tier || 0;
          b.waveDelay = (waveIdx || 0) * 38;
          b.waveActive = false;
          b.spin = rand(-0.8, 0.8);
          b.arcDrift = rand(-0.012, 0.012);
          b.veinSeed = rand(0, TAU);
          b.trailX = x; b.trailY = y;
          b.trailPoints = [];
        }

        /* — Shockwaves (original) — */
        const waves = [];
        /* — Flash glows — */
        const flashes = [];
        /* — Aura distortion cells — */
        const HDMAX = 200;
        const hdCells = [];
        for (let i = 0; i < HDMAX; i++) hdCells.push({ alive: false });
        let hdHead = 0;
        function spawnHD(x, y, str, life) {
          const h = hdCells[hdHead % HDMAX]; hdHead++;
          h.alive = true; h.x = x; h.y = y; h.str = str; h.age = 0; h.life = life;
        }

        /* — Trail points — */
        const TMAX = 70;
        const trail = [];

        /* ══════════════════════════════════════════
           DRAW PRIMITIVES
        ══════════════════════════════════════════ */

        /* Standard crescent (ambient + burst arcs) */
        function drawCrescent(cx, cy, r, angle, hot, blood, alpha) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle);
          ctx.beginPath();
          ctx.arc(0, 0, r, 0.2, Math.PI - 0.2);
          const off = r * 0.38;
          ctx.arc(off, 0, r * 0.72, Math.PI - 0.25, 0.25, true);
          ctx.closePath();
          const col     = blood ? bloodColor(hot, alpha)         : moonColor(hot, alpha);
          const colFade = blood ? bloodColor(hot * 0.4, 0)       : moonColor(hot * 0.4, 0);
          const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
          g.addColorStop(0, col);
          g.addColorStop(0.6, blood ? bloodColor(hot * 0.7, alpha * 0.6) : moonColor(hot * 0.7, alpha * 0.6));
          g.addColorStop(1, colFade);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.restore();
        }

        /* Kokushibo moon blade */
        function drawMoonBlade(b, alpha) {
          const tp  = b.age / b.life;
          const r   = b.r * (1 + tp * 0.14);

          ctx.save();
          ctx.translate(b.x, b.y);
          ctx.rotate(b.angle + Math.PI * 0.5);

          /* Glow aura behind blade */
          const glowR = r * 2.6;
          const glowG = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
          glowG.addColorStop(0,   `rgba(180,8,22,${alpha * 0.28})`);
          glowG.addColorStop(0.4, `rgba(120,0,18,${alpha * 0.14})`);
          glowG.addColorStop(1,   "rgba(0,0,0,0)");
          ctx.fillStyle = glowG;
          ctx.beginPath();
          ctx.arc(0, 0, glowR, 0, TAU);
          ctx.fill();

          /* Crescent shape: ~1/3 to 1/2 moon */
          const arcStart  = -Math.PI * 0.72;
          const arcEnd    =  Math.PI * 0.72;
          const innerOffX = r * 0.44;
          const innerR    = r * 0.68;

          ctx.beginPath();
          ctx.arc(0, 0, r, arcStart, arcEnd);
          ctx.arc(innerOffX, 0, innerR, arcEnd - 0.08, arcStart + 0.08, true);
          ctx.closePath();

          /* Layered fill */
          const fillG = ctx.createLinearGradient(-r, -r * 0.5, r * 0.6, r * 0.5);
          fillG.addColorStop(0,    `rgba(6,0,4,${alpha * 0.95})`);
          fillG.addColorStop(0.18, `rgba(90,2,10,${alpha * 0.98})`);
          fillG.addColorStop(0.42, `rgba(190,10,28,${alpha})`);
          fillG.addColorStop(0.65, `rgba(230,22,40,${alpha * 0.95})`);
          fillG.addColorStop(0.82, `rgba(160,8,20,${alpha * 0.88})`);
          fillG.addColorStop(1,    `rgba(20,0,6,${alpha * 0.72})`);
          ctx.fillStyle = fillG;
          ctx.fill();

          /* Leading edge highlight */
          ctx.beginPath();
          ctx.arc(0, 0, r, arcStart, arcEnd);
          ctx.lineWidth   = Math.max(0.5, r * 0.045 * (1 - tp * 0.4));
          ctx.strokeStyle = `rgba(255,140,155,${alpha * 0.88})`;
          ctx.stroke();

          /* Bright inner rim */
          ctx.beginPath();
          ctx.arc(0, 0, r * 0.98, arcStart + 0.06, arcEnd - 0.06);
          ctx.lineWidth   = Math.max(0.3, r * 0.022);
          ctx.strokeStyle = `rgba(255,220,225,${alpha * 0.55})`;
          ctx.stroke();

          /* Dark vein patterns inside blade */
          ctx.save();
          ctx.beginPath();
          ctx.arc(0, 0, r, arcStart, arcEnd);
          ctx.arc(innerOffX, 0, innerR, arcEnd - 0.08, arcStart + 0.08, true);
          ctx.closePath();
          ctx.clip();

          const veinAlpha = alpha * (0.28 + 0.12 * Math.sin(b.veinSeed));
          ctx.lineWidth   = Math.max(0.4, r * 0.028);
          ctx.strokeStyle = `rgba(4,0,2,${veinAlpha})`;
          ctx.lineCap = "round";
          for (let v = 0; v < 3; v++) {
            const va  = arcStart + (v + 0.8) * (arcEnd - arcStart) / 3.5;
            const vx1 = Math.cos(va) * r * 0.22;
            const vy1 = Math.sin(va) * r * 0.22;
            const vx2 = Math.cos(va + 0.28) * r * 0.76;
            const vy2 = Math.sin(va + 0.28) * r * 0.76;
            const vcx = Math.cos(va + 0.14) * r * 0.5 + Math.sin(b.veinSeed + v) * r * 0.08;
            const vcy = Math.sin(va + 0.14) * r * 0.5;
            ctx.beginPath();
            ctx.moveTo(vx1, vy1);
            ctx.quadraticCurveTo(vcx, vcy, vx2, vy2);
            ctx.stroke();
          }

          /* Dark depth overlay */
          const darkOverlay = ctx.createRadialGradient(
            innerOffX * 0.6, 0, r * 0.08,
            innerOffX * 0.6, 0, r * 0.52
          );
          darkOverlay.addColorStop(0, `rgba(2,0,1,${alpha * 0.55})`);
          darkOverlay.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = darkOverlay;
          ctx.beginPath();
          ctx.arc(0, 0, r, arcStart, arcEnd);
          ctx.arc(innerOffX, 0, innerR, arcEnd - 0.08, arcStart + 0.08, true);
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          /* Trailing violet-red energy wisps from blade tips */
          const wispAlpha = alpha * 0.38 * (1 - tp * 0.6);
          if (wispAlpha > 0.01) {
            for (let w = 0; w < 2; w++) {
              const wa = arcStart + w * (arcEnd - arcStart);
              const wx = Math.cos(wa) * r;
              const wy = Math.sin(wa) * r;
              const wg = ctx.createRadialGradient(wx, wy, 0, wx, wy, r * 0.38);
              wg.addColorStop(0,   `rgba(200,30,55,${wispAlpha})`);
              wg.addColorStop(0.5, `rgba(120,5,25,${wispAlpha * 0.45})`);
              wg.addColorStop(1,   "rgba(0,0,0,0)");
              ctx.fillStyle = wg;
              ctx.beginPath();
              ctx.arc(wx, wy, r * 0.38, 0, TAU);
              ctx.fill();
            }
          }

          ctx.restore();
        }

        /* ══════════════════════════════════════════
           BURST — original Moon Breathing + Kokushibo moon blades
        ══════════════════════════════════════════ */
        function burst(x, y) {

          /* ── ORIGINAL BURST — restored exactly ── */

          /* Shockwave rings */
          waves.push({ x, y, r: 0, maxR: rand(200, 300), age: 0, life: 700 });

          /* Bright violet flash */
          flashes.push({ x, y, r: 0, maxR: rand(260, 400), age: 0, life: 550, dark: false });

          /* 18 crescent moon slashes in all directions */
          const ARCS = 18;
          for (let i = 0; i < ARCS; i++) {
            const a       = (i / ARCS) * TAU + rand(-0.12, 0.12);
            const spd     = rand(140, 400);
            const isBlood = Math.random() < 0.3;
            spawnCrescent(x, y, a, spd, rand(18, 45), rand(450, 850), rand(0.7, 1.0), isBlood);
            spawnFlame(
              x, y,
              Math.cos(a) * spd * 0.5, Math.sin(a) * spd * 0.5,
              rand(22, 48), rand(350, 700), rand(0.6, 1.0), isBlood
            );
            if (i % 2 === 0)
              spawnSmoke(
                x + rand(-8, 8), y + rand(-8, 8),
                Math.cos(a) * spd * 0.18, Math.sin(a) * spd * 0.18 - rand(25, 55),
                rand(20, 38), rand(550, 850), true
              );
          }

          /* 140 void sparks — mix violet and blood */
          for (let i = 0; i < 140; i++) {
            const a       = rand(0, TAU);
            const spd     = rand(90, 520);
            const isBlood = Math.random() < 0.25;
            spawnSpark(x, y, Math.cos(a) * spd, Math.sin(a) * spd, rand(280, 950), rand(0.7, 1.0), isBlood);
          }

          /* 90 moon motes */
          for (let i = 0; i < 90; i++) {
            const a       = rand(0, TAU);
            const spd     = rand(35, 210);
            const isBlood = Math.random() < 0.2;
            spawnEmber(
              x, y,
              Math.cos(a) * spd, Math.sin(a) * spd - rand(40, 110),
              rand(500, 1300), rand(1.5, 3.5), rand(0.5, 1.0), isBlood
            );
          }

          spawnHD(x, y, rand(9, 15), rand(600, 1000));

          /* ── NEW KOKUSHIBO MOON BLADES — added on top ── */

          /* TIER 0: 4 primary large moon blades */
          const PRIMARY_COUNT = 4;
          for (let i = 0; i < PRIMARY_COUNT; i++) {
            const baseAngle = (i / PRIMARY_COUNT) * TAU + rand(-0.14, 0.14);
            spawnMoonBlade(x, y, baseAngle, rand(230, 310), rand(44, 58), rand(700, 950), 0, i);
          }

          /* TIER 1: 6 secondary medium blades */
          const SECONDARY_COUNT = 6;
          for (let i = 0; i < SECONDARY_COUNT; i++) {
            const baseAngle = (i / SECONDARY_COUNT) * TAU + (Math.PI / SECONDARY_COUNT) + rand(-0.18, 0.18);
            spawnMoonBlade(x, y, baseAngle, rand(310, 420), rand(28, 40), rand(560, 780), 1, i);
          }

          /* TIER 2: 5 fast small trailing blades */
          const TERTIARY_COUNT = 5;
          for (let i = 0; i < TERTIARY_COUNT; i++) {
            spawnMoonBlade(x, y, rand(0, TAU), rand(420, 580), rand(14, 22), rand(380, 560), 2, i);
          }
        }

        /* ── Trail helpers ── */
        function addTrail(x, y, t) {
          if (trail.length >= TMAX) trail.shift();
          trail.push({ x, y, t });
        }

        /* ── MAIN LOOP ── */
        let last = performance.now();
        let ambE = 0, ambF = 0, ambHD = 0, ambC = 0;

        function frame(now) {
          requestAnimationFrame(frame);
          const dt  = Math.min(now - last, 33);
          last = now;
          const dtS = dt * 0.001;

          /* pointer tracking */
          P.px = P.x; P.py = P.y;
          const ease = 1 - Math.pow(0.001, dtS * 5);
          P.x = lerp(P.x, P.tx, ease);
          P.y = lerp(P.y, P.ty, ease);
          P.vx = (P.x - P.px) / Math.max(dtS, 0.001);
          P.vy = (P.y - P.py) / Math.max(dtS, 0.001);
          P.speed = Math.hypot(P.vx, P.vy);

          /* parallax bg */
          const bx = (P.tx / W - 0.5) * -32;
          const by = (P.ty / H - 0.5) * -32;
          document.getElementById("tbg").style.transform =
            `translate(${bx}px,${by}px) scale(1.08)`;

          /* trail */
          addTrail(P.x, P.y, now);
          while (trail.length && now - trail[0].t > 380) trail.shift();

          const idle        = now - P.lastMove;
          const moving      = idle < 120;
          const speedFactor = clamp(P.speed / 300, 0, 1);

          /* ambient moon mote emission */
          ambE -= dt;
          if (ambE <= 0) {
            ambE = moving ? rand(8, 22) : rand(28, 55);
            const n = moving ? randi(2, 5) : 1;
            for (let i = 0; i < n; i++) {
              const a   = -Math.PI / 2 + rand(-1.0, 1.0);
              const spd = rand(15, 70) * (1 + speedFactor * 1.8);
              spawnEmber(
                P.x + rand(-5, 5), P.y + rand(-5, 5),
                Math.cos(a) * spd, Math.sin(a) * spd - rand(15, 45),
                rand(700, 1600), rand(1.0, 2.8), rand(0.4, 0.9), Math.random() < 0.1
              );
            }
          }

          /* ambient moon energy */
          ambF -= dt;
          if (ambF <= 0) {
            ambF = moving ? rand(10, 25) : rand(30, 65);
            const n = moving ? randi(2, 6) : randi(1, 3);
            for (let i = 0; i < n; i++) {
              const a   = -Math.PI / 2 + rand(-1.1, 1.1);
              const spd = rand(12, 65) * (1 + speedFactor * 1.4);
              spawnFlame(
                P.x + rand(-6, 6), P.y + rand(-6, 6),
                Math.cos(a) * spd * 0.45, Math.sin(a) * spd - rand(8, 38),
                rand(9, 26) * (1 + speedFactor * 0.7),
                rand(160, 380), rand(0.4, 1.0), Math.random() < 0.08
              );
            }
            if (Math.random() < (moving ? 0.35 : 0.08))
              spawnSmoke(
                P.x + rand(-8, 8), P.y - 8,
                rand(-12, 12), rand(-35, -12),
                rand(12, 24), rand(380, 680), false
              );
          }

          /* ambient crescent */
          ambC -= dt;
          if (ambC <= 0) {
            ambC = moving ? rand(60, 140) : rand(200, 400);
            if (moving && P.speed > 40) {
              spawnCrescent(
                P.x + rand(-8, 8), P.y + rand(-8, 8),
                -Math.PI / 2 + rand(-1.3, 1.3),
                rand(20, 70), rand(6, 16),
                rand(350, 700), rand(0.5, 0.9), Math.random() < 0.12
              );
            }
          }

          /* aura distortion */
          ambHD -= dt;
          if (ambHD <= 0) {
            ambHD = rand(90, 170);
            spawnHD(P.x + rand(-18, 18), P.y + rand(-18, 18), rand(3, 6), rand(180, 380));
          }

          /* movement-triggered emission */
          if (moving && P.speed > 20) {
            const n = clamp((P.speed / 100) | 0, 1, 6);
            for (let i = 0; i < n; i++) {
              const t   = Math.random();
              const sx  = lerp(P.px, P.x, t), sy = lerp(P.py, P.y, t);
              const a   = -Math.PI / 2 + rand(-1.2, 1.2);
              const spd = rand(28, 100) + speedFactor * 55;
              const isBlood = Math.random() < 0.12;
              spawnFlame(
                sx + rand(-4, 4), sy + rand(-4, 4),
                P.vx * 0.1 + Math.cos(a) * spd * 0.4,
                -Math.abs(Math.sin(a) * spd) - rand(18, 50),
                rand(7, 20), rand(140, 320), rand(0.6, 1.0), isBlood
              );
              if (Math.random() < 0.45)
                spawnEmber(
                  sx, sy,
                  P.vx * 0.07 + rand(-35, 35), -rand(35, 120),
                  rand(500, 1100), rand(1, 2.5), rand(0.5, 1.0), isBlood
                );
              if (P.speed > 120 && Math.random() < 0.25)
                spawnSpark(
                  sx, sy,
                  P.vx * 0.18 + rand(-70, 70), P.vy * 0.18 + rand(-70, 70),
                  rand(180, 480), 0.85, isBlood
                );
              if (P.speed > 180 && Math.random() < 0.18)
                spawnCrescent(
                  sx, sy,
                  Math.atan2(P.vy, P.vx) + rand(-0.5, 0.5),
                  rand(60, 160), rand(8, 18),
                  rand(250, 550), rand(0.7, 1.0), Math.random() < 0.15
                );
            }
          }

          /* ═══ DRAW ═══ */
          ctx.clearRect(0, 0, W, H);
          ctx.globalCompositeOperation = "lighter";

          /* ── ORIGINAL: Flashes — violet/purple ── */
          for (let i = flashes.length - 1; i >= 0; i--) {
            const f = flashes[i]; f.age += dt;
            if (f.age >= f.life) { flashes.splice(i, 1); continue; }
            const tp = f.age / f.life;
            const r  = lerp(0, f.maxR, Math.pow(tp, 0.28));
            const a  = (1 - tp) * (1 - tp) * 0.32;
            const g  = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
            g.addColorStop(0,    `rgba(220,180,255,${a})`);
            g.addColorStop(0.25, `rgba(160,60,220,${a * 0.8})`);
            g.addColorStop(0.5,  `rgba(80,10,140,${a * 0.5})`);
            g.addColorStop(0.75, `rgba(120,5,30,${a * 0.25})`);
            g.addColorStop(1,    "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(f.x, f.y, r, 0, TAU); ctx.fill();
          }

          /* ── ORIGINAL: Shockwaves — violet rings ── */
          for (let i = waves.length - 1; i >= 0; i--) {
            const w = waves[i]; w.age += dt;
            if (w.age >= w.life) { waves.splice(i, 1); continue; }
            const tp = w.age / w.life;
            const r  = lerp(0, w.maxR, Math.pow(tp, 0.5));
            const a  = (1 - tp) * (1 - tp) * 0.75;
            const lw = lerp(7, 0.4, tp);

            ctx.beginPath(); ctx.arc(w.x, w.y, r, 0, TAU);
            ctx.lineWidth   = lw;
            ctx.strokeStyle = `rgba(180,80,255,${a})`; ctx.stroke();

            ctx.lineWidth   = lw * 3;
            ctx.strokeStyle = `rgba(100,20,180,${a * 0.35})`; ctx.stroke();

            /* blood moon inner ring */
            if (tp < 0.45) {
              const r2 = lerp(0, w.maxR * 0.45, tp / 0.45);
              ctx.beginPath(); ctx.arc(w.x, w.y, r2, 0, TAU);
              ctx.lineWidth   = lw * 0.6;
              ctx.strokeStyle = `rgba(220,40,80,${a * 0.55})`; ctx.stroke();
            }
          }

          /* ── Lunar mist (source-over, drawn under energy) ── */
          ctx.globalCompositeOperation = "source-over";
          for (let i = 0; i < SMAX; i++) {
            const s = smoke[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) { s.alive = false; continue; }
            s.x += s.vx * dtS; s.y += s.vy * dtS;
            s.vy -= dtS * 6; s.vx += rand(-3, 3) * dtS;
            const tp  = s.age / s.life;
            const r   = s.r * (1 + tp * 1.3);
            const a   = s.dark
              ? (1 - tp) * 0.16 * Math.sin(tp * Math.PI)
              : (1 - tp) * 0.09 * Math.sin(tp * Math.PI);
            const col = s.dark ? `rgba(8,2,18,${a})` : `rgba(60,20,100,${a * 0.7})`;
            const g   = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, Math.max(1, r));
            g.addColorStop(0, col); g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(s.x, s.y, Math.max(1, r), 0, TAU); ctx.fill();
          }

          /* ── Moon energy puffs ── */
          ctx.globalCompositeOperation = "lighter";
          for (let i = 0; i < FMAX; i++) {
            const f = flames[i];
            if (!f.alive) continue;
            f.age += dt;
            if (f.age >= f.life) { f.alive = false; continue; }
            f.x += f.vx * dtS; f.y += f.vy * dtS;
            f.vy -= dtS * 42;
            f.vx *= Math.pow(0.96, dtS * 60);
            f.vx += Math.sin(now * 0.006 + f.age * 0.009) * dtS * 30;
            const tp      = f.age / f.life;
            const hotness = f.hot * (1 - tp);
            const r       = f.r * (1 + tp * 0.28);
            const a       = Math.sin(tp * Math.PI) * 0.65 * f.hot;
            const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, Math.max(1, r));
            if (f.blood) {
              g.addColorStop(0,    bloodColor(hotness, a));
              g.addColorStop(0.45, bloodColor(hotness * 0.6, a * 0.65));
              g.addColorStop(0.8,  bloodColor(hotness * 0.3, a * 0.28));
            } else {
              g.addColorStop(0,    moonColor(hotness, a));
              g.addColorStop(0.45, moonColor(hotness * 0.6, a * 0.65));
              g.addColorStop(0.8,  moonColor(hotness * 0.3, a * 0.28));
            }
            g.addColorStop(1, "rgba(0,0,0,0)");
            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(f.x, f.y, Math.max(1, r), 0, TAU); ctx.fill();
          }

          /* ── Ambient crescent moon shapes ── */
          for (let i = 0; i < CMAX; i++) {
            const c = crescents[i];
            if (!c.alive) continue;
            c.age += dt;
            if (c.age >= c.life) { c.alive = false; continue; }
            c.x += c.vx * dtS; c.y += c.vy * dtS;
            c.vy -= dtS * 18;
            c.vx *= Math.pow(0.97, dtS * 60);
            c.angle += c.spin * dtS;
            const tp = c.age / c.life;
            const r  = c.r * (1 + tp * 0.2);
            const a  = Math.sin(tp * Math.PI) * 0.8 * c.hot;
            if (a > 0.01) drawCrescent(c.x, c.y, r, c.angle, c.hot * (1 - tp), c.blood, a);
          }

          /* ── NEW: Kokushibo Moon Blades ── */
          for (let i = 0; i < MBMAX; i++) {
            const b = moonBlades[i];
            if (!b.alive) continue;

            if (!b.waveActive) {
              b.waveDelay -= dt;
              if (b.waveDelay > 0) continue;
              b.waveActive = true;
            }

            b.age += dt;
            if (b.age >= b.life) { b.alive = false; continue; }

            /* curved arc trajectory */
            b.vx += (-b.vy * b.arcDrift) * dt;
            b.vy += ( b.vx * b.arcDrift) * dt;
            b.x  += b.vx * dtS;
            b.y  += b.vy * dtS;
            const decay = Math.pow(0.998, dtS * 60);
            b.vx *= decay; b.vy *= decay;
            b.angle  = Math.atan2(b.vy, b.vx);
            b.angle += b.spin * dtS;

            /* trail points */
            if (b.trailPoints.length === 0 || Math.hypot(b.x - b.trailX, b.y - b.trailY) > 4) {
              b.trailPoints.push({ x: b.x, y: b.y });
              if (b.trailPoints.length > 7) b.trailPoints.shift();
              b.trailX = b.x; b.trailY = b.y;
            }

            const tp      = b.age / b.life;
            const fadeIn  = Math.min(1, b.age / 80);
            const fadeOut = tp > 0.65 ? 1 - (tp - 0.65) / 0.35 : 1;
            const alpha   = fadeIn * fadeOut * (b.tier === 0 ? 0.92 : b.tier === 1 ? 0.82 : 0.68);
            if (alpha < 0.02) continue;

            /* Violet-red energy trail */
            if (b.trailPoints.length >= 2) {
              ctx.save();
              ctx.globalCompositeOperation = "lighter";
              for (let t = 1; t < b.trailPoints.length; t++) {
                const tRatio = t / b.trailPoints.length;
                const tAlpha = tRatio * alpha * (b.tier === 0 ? 0.42 : 0.28);
                const tw     = b.r * tRatio * 0.38;
                const tp0    = b.trailPoints[t - 1];
                const tp1    = b.trailPoints[t];
                ctx.beginPath();
                ctx.moveTo(tp0.x, tp0.y); ctx.lineTo(tp1.x, tp1.y);
                ctx.lineWidth   = tw * 2.8;
                ctx.strokeStyle = `rgba(140,6,22,${tAlpha * 0.5})`; ctx.stroke();
                ctx.lineWidth   = tw * 1.2;
                ctx.strokeStyle = `rgba(220,30,50,${tAlpha * 0.8})`; ctx.stroke();
                ctx.lineWidth   = tw * 0.4;
                ctx.strokeStyle = `rgba(255,100,120,${tAlpha})`; ctx.stroke();
              }
              ctx.restore();
            }

            ctx.globalCompositeOperation = "lighter";
            drawMoonBlade(b, alpha);
          }

          /* ── Trail — moon energy ribbon ── */
          if (trail.length >= 3) {
            for (let i = 1; i < trail.length; i++) {
              const age   = (now - trail[i].t) / 380;
              const alpha = clamp(1 - age, 0, 1);
              if (alpha < 0.01) continue;
              const w = lerp(1.5, 9, 1 - age);
              ctx.beginPath();
              ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
              ctx.lineTo(trail[i].x,     trail[i].y);
              ctx.lineWidth   = w * 4.5;
              ctx.strokeStyle = `rgba(60,0,120,${alpha * 0.15})`; ctx.stroke();
              ctx.lineWidth   = w * 2.8;
              ctx.strokeStyle = `rgba(130,30,200,${alpha * 0.28})`; ctx.stroke();
              ctx.lineWidth   = w * 1.6;
              ctx.strokeStyle = `rgba(180,20,60,${alpha * 0.22})`; ctx.stroke();
              ctx.lineWidth   = w * 1.1;
              ctx.strokeStyle = `rgba(200,140,255,${alpha * 0.6})`; ctx.stroke();
              ctx.lineWidth   = Math.max(0.8, w * 0.45);
              ctx.strokeStyle = `rgba(240,220,255,${alpha * 0.92})`; ctx.stroke();
            }
          }

          /* ── Void sparks ── */
          for (let i = 0; i < SPKMAX; i++) {
            const s = sparks[i];
            if (!s.alive) continue;
            s.age += dt;
            if (s.age >= s.life) { s.alive = false; continue; }
            s.px = s.x; s.py = s.y;
            s.x += s.vx * dtS; s.y += s.vy * dtS;
            s.vy += 140 * dtS;
            s.vx *= Math.pow(0.9, dtS * 60);
            const tp      = s.age / s.life;
            const a       = clamp((1 - tp) * (1 - tp) * s.bright * 1.2, 0, 1);
            const hotness = 1 - tp * 0.55;
            const tlen    = Math.hypot(s.x - s.px, s.y - s.py);
            const slen    = clamp(tlen, 2, 20);
            const ang     = Math.atan2(s.y - s.py, s.x - s.px);
            ctx.setTransform(dpr, 0, 0, dpr, s.x, s.y);
            ctx.rotate(ang + Math.PI);
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(slen, 0);
            const gc = ctx.createLinearGradient(0, 0, slen, 0);
            if (s.blood) {
              gc.addColorStop(0, bloodColor(hotness, a));
              gc.addColorStop(1, bloodColor(hotness * 0.35, 0));
            } else {
              gc.addColorStop(0, moonColor(hotness, a));
              gc.addColorStop(1, moonColor(hotness * 0.35, 0));
            }
            ctx.strokeStyle = gc;
            ctx.lineWidth   = clamp(2 - tp * 1.5, 0.4, 2); ctx.stroke();
            ctx.strokeStyle = s.blood ? bloodColor(hotness, a * 0.22) : moonColor(hotness, a * 0.22);
            ctx.lineWidth   = clamp(2 - tp * 1.5, 0.4, 2) * 2.2; ctx.stroke();
          }
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          /* ── Moon motes ── */
          for (let i = 0; i < EMAX; i++) {
            const e = embers[i];
            if (!e.alive) continue;
            e.age += dt;
            if (e.age >= e.life) { e.alive = false; continue; }
            e.x += e.vx * dtS + Math.sin(now * 0.0035 + e.phase) * e.sway * dtS;
            e.y += e.vy * dtS;
            e.vy += e.grav * dtS;
            e.vx *= Math.pow(0.975, dtS * 60);
            e.rot += e.rotSpd * dtS;
            const tp      = e.age / e.life;
            const hotness = e.hot * (1 - tp * 0.65);
            const a       = (1 - tp) * (1 - tp) * 0.92;
            const r       = e.sz * (1 - tp * 0.28);
            if (r < 0.4) continue;
            ctx.fillStyle = e.blood ? bloodColor(hotness, a) : moonColor(hotness, a);
            ctx.beginPath(); ctx.arc(e.x, e.y, Math.max(0.4, r), 0, TAU); ctx.fill();
            ctx.fillStyle = e.blood
              ? bloodColor(clamp(hotness, 0, 1), a * 0.25)
              : moonColor(clamp(hotness, 0, 1), a * 0.25);
            ctx.beginPath(); ctx.arc(e.x, e.y, Math.max(0.4, r * 2.4), 0, TAU); ctx.fill();
          }

          /* ── Cursor tip — Moon Breathing core (unchanged) ── */
          {
            const breathe =
              0.86 +
              0.09  * Math.sin(now * 0.0098) +
              0.055 * Math.sin(now * 0.024 + 1.1) +
              0.035 * Math.sin(now * 0.041 + 2.4);
            const jx = Math.sin(now * 0.018) * 1.0;
            const jy = Math.sin(now * 0.015 + 1.8) * 1.0;
            const cx = P.x + jx, cy = P.y + jy;

            const vg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 72 * breathe);
            vg.addColorStop(0,   `rgba(100,20,180,0.18)`);
            vg.addColorStop(0.5, `rgba(50,5,100,0.07)`);
            vg.addColorStop(1,   "rgba(0,0,0,0)");
            ctx.fillStyle = vg;
            ctx.beginPath(); ctx.arc(cx, cy, 72 * breathe, 0, TAU); ctx.fill();

            const bg2 = ctx.createRadialGradient(cx, cy, 16 * breathe, cx, cy, 44 * breathe);
            bg2.addColorStop(0,   "rgba(0,0,0,0)");
            bg2.addColorStop(0.5, `rgba(160,10,40,0.12)`);
            bg2.addColorStop(1,   "rgba(0,0,0,0)");
            ctx.fillStyle = bg2;
            ctx.beginPath(); ctx.arc(cx, cy, 44 * breathe, 0, TAU); ctx.fill();

            const mg = ctx.createRadialGradient(cx, cy - 1.5, 0, cx, cy, 30 * breathe);
            mg.addColorStop(0,    `rgba(210,160,255,0.82)`);
            mg.addColorStop(0.28, `rgba(160,60,240,0.68)`);
            mg.addColorStop(0.65, `rgba(80,10,150,0.32)`);
            mg.addColorStop(1,    "rgba(0,0,0,0)");
            ctx.fillStyle = mg;
            ctx.beginPath(); ctx.arc(cx, cy - 1.5, 30 * breathe, 0, TAU); ctx.fill();

            const hg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 9 * breathe);
            hg.addColorStop(0,    `rgba(255,240,255,1)`);
            hg.addColorStop(0.4,  `rgba(220,180,255,0.92)`);
            hg.addColorStop(0.75, `rgba(160,80,240,0.5)`);
            hg.addColorStop(1,    `rgba(80,0,160,0)`);
            ctx.fillStyle = hg;
            ctx.beginPath(); ctx.arc(cx, cy, 9 * breathe, 0, TAU); ctx.fill();

            const orbitAngle = now * 0.0025;
            const ox  = cx + Math.cos(orbitAngle) * 14 * breathe;
            const oy  = cy + Math.sin(orbitAngle) * 14 * breathe;
            ctx.save(); ctx.globalAlpha = 0.55 * breathe;
            drawCrescent(ox, oy, 5 * breathe, orbitAngle + Math.PI * 0.6, 0.85, false, 0.7);
            ctx.globalAlpha = 1; ctx.restore();

            const ox2 = cx + Math.cos(orbitAngle + Math.PI) * 11 * breathe;
            const oy2 = cy + Math.sin(orbitAngle + Math.PI) * 11 * breathe;
            ctx.save(); ctx.globalAlpha = 0.38 * breathe;
            drawCrescent(ox2, oy2, 3.5 * breathe, orbitAngle + Math.PI * 1.6, 0.75, true, 0.6);
            ctx.globalAlpha = 1; ctx.restore();

            ctx.fillStyle = `rgba(255,255,255,${breathe * 0.95})`;
            ctx.beginPath(); ctx.arc(cx, cy, 2.2 * breathe, 0, TAU); ctx.fill();
          }

          ctx.globalCompositeOperation = "source-over";

          /* ── Aura shimmer on HD canvas ── */
          hctx.clearRect(0, 0, W, H);
          for (let i = 0; i < HDMAX; i++) {
            const h = hdCells[i];
            if (!h.alive) continue;
            h.age += dt;
            if (h.age >= h.life) { h.alive = false; continue; }
            const tp = h.age / h.life;
            const r  = h.str * 18 * (1 - tp * 0.35);
            const a  = (1 - tp) * 0.1;
            const g  = hctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, r);
            g.addColorStop(0,   `rgba(140,60,220,${a})`);
            g.addColorStop(0.5, `rgba(80,10,120,${a * 0.4})`);
            g.addColorStop(1,   "rgba(0,0,0,0)");
            hctx.fillStyle = g;
            hctx.beginPath(); hctx.arc(h.x, h.y, r, 0, TAU); hctx.fill();
          }
        }

        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
